# Mosquitto fuer die AWTRIX-Uhr (privater Broker auf Railway).
# Plaintext 1883 (AWTRIX 0.98 kann kein TLS). Auth per Passwortdatei.
listener 1883 0.0.0.0
protocol mqtt

# Keine anonymen Clients -- nur user/pass aus der per Entrypoint erzeugten Datei.
allow_anonymous false
password_file /mosquitto/config/passwd

# Retained Messages + Sessions ueber Neustarts hinweg behalten (Volume an /mosquitto/data).
persistence true
persistence_location /mosquitto/data/
autosave_interval 60

# Clients NICHT willkuerlich rauswerfen (das war das Problem am oeffentlichen Broker).
# Kein persistent_client_expiration -> Sessions laufen nie ab.
max_keepalive 120
