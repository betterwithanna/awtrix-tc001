name: AWTRIX Instagram Push

# Schiebt alle ~10-15 Minuten Annas Instagram-Zahlen ueber den PRIVATEN
# Mosquitto-Broker auf Railway (reseau.proxy.rlwy.net:38125, plaintext+Login)
# an die Uhr.
#
# Warum privater Broker?
#   AWTRIX 0.98 kann KEIN MQTT-over-TLS (HiveMQ/flespi scheiden aus). Der frueher
#   genutzte oeffentliche broker.emqx.io warf Clients still raus -> Display fror
#   ein. Eigener Broker (broker/ im Repo) = stabile Verbindung, user/pass-Login.
#
# HINWEIS: In der Cloud funktioniert nur MODE=mqtt -- HTTP erreicht das Geraet
# im Heim-WLAN nicht. Cron laeuft nur auf dem Default-Branch.

on:
  schedule:
    - cron: "*/15 * * * *"      # alle 15 Minuten (Zeiten in UTC)
  workflow_dispatch: {}          # manueller Start-Button im Actions-Tab

concurrency:
  group: awtrix-push
  cancel-in-progress: false

jobs:
  push:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Push to AWTRIX
        env:
          # Nicht-geheime Defaults:
          MODE: mqtt
          MQTT_HOST: reseau.proxy.rlwy.net
          MQTT_PORT: "38125"
          MQTT_TLS: "false"
          IG_AUTH: instagram
          IG_API_VERSION: v21.0
          # Mailing (Supabase) -- Publishable Key ist oeffentlich-sicher:
          SUPABASE_URL: https://yayfjzetdpofpcoklwrr.supabase.co
          SUPABASE_KEY: sb_publishable_5LSC86Vn81iJG17-eYLZkQ_mab2MtVp
          # YouTube -- Channel-ID ist oeffentlich, Key kommt aus Secret:
          YT_CHANNEL_ID: UCPYugblWsGTrr1F2jp7wzqQ
          # Geheimnisse aus den Repository-Secrets:
          PREFIX: ${{ secrets.MQTT_PREFIX }}
          MQTT_USER: ${{ secrets.MQTT_USER }}
          MQTT_PASS: ${{ secrets.MQTT_PASS }}
          IG_TOKEN: ${{ secrets.IG_TOKEN }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          YT_API_KEY: ${{ secrets.YT_API_KEY }}
          # Schreib-Token fuer die Tages-Kennzahlen (Follower-Zuwachs etc.):
          REVENUE_TOKEN: ${{ secrets.REVENUE_TOKEN }}
        run: python main.py
