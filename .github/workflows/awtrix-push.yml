name: AWTRIX Instagram Push

# Schiebt alle 15 Minuten Annas Instagram-Zahlen ueber einen oeffentlichen
# MQTT-Broker (broker.emqx.io, ohne TLS/Login) an die Uhr.
#
# Warum oeffentlicher Broker ohne Login?
#   AWTRIX 0.98 kann KEIN MQTT-over-TLS (HiveMQ scheidet aus) und hat ein zu
#   kurzes Username-Feld fuer lange Tokens (flespi scheidet aus). Schutz erfolgt
#   ueber einen nicht erratbaren PREFIX (liegt als Secret).
#
# HINWEIS: In der Cloud funktioniert nur MODE=mqtt -- HTTP erreicht das Geraet
# im Heim-WLAN nicht. Cron laeuft nur auf dem Default-Branch.

on:
  schedule:
    - cron: "*/15 * * * *"      # alle 15 Minuten (Zeiten in UTC)
  workflow_dispatch: {}          # manueller Start-Button im Actions-Tab

concurrency:
  group: awtrix-push
  cancel-in-progress: false

jobs:
  push:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Push to AWTRIX
        env:
          # Nicht-geheime Defaults:
          MODE: mqtt
          MQTT_HOST: broker.emqx.io
          MQTT_PORT: "1883"
          MQTT_TLS: "false"
          IG_AUTH: instagram
          IG_API_VERSION: v21.0
          # Mailing (Supabase) -- Publishable Key ist oeffentlich-sicher:
          SUPABASE_URL: https://yayfjzetdpofpcoklwrr.supabase.co
          SUPABASE_KEY: sb_publishable_5LSC86Vn81iJG17-eYLZkQ_mab2MtVp
          # YouTube -- Channel-ID ist oeffentlich, Key kommt aus Secret:
          YT_CHANNEL_ID: UCPYugblWsGTrr1F2jp7wzqQ
          # Geheimnisse aus den Repository-Secrets:
          PREFIX: ${{ secrets.MQTT_PREFIX }}
          IG_TOKEN: ${{ secrets.IG_TOKEN }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          YT_API_KEY: ${{ secrets.YT_API_KEY }}
          # Schreib-Token fuer die Tages-Kennzahlen (Follower-Zuwachs etc.):
          REVENUE_TOKEN: ${{ secrets.REVENUE_TOKEN }}
        run: python main.py
